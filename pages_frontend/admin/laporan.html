<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan — Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --green-dark: #1d3b2f;
    --green-darker: #14291f;
    --green-soft: #e7ede9;
    --cream: #f4f1ea;
    --ink: #2b2b26;
    --muted: #7a7a72;
    --border: #e2ddd0;
    --input-bg: #f5f3ee;
    --error: #b3492f;
    --error-bg: #fbeae5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--cream);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: 28px 20px; min-height: 100vh;
  }
  .sidebar-brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 600;
    color: var(--green-dark); text-align: center; margin-bottom: 36px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px; border-radius: 4px;
    color: var(--ink); text-decoration: none;
    font-size: 13.5px; font-weight: 500; margin-bottom: 4px;
    transition: background 0.15s ease;
  }
  .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; stroke: var(--ink); fill: none; }
  .nav-item:hover { background: var(--green-soft); }
  .nav-item.active { background: var(--green-soft); color: var(--green-dark); font-weight: 600; }
  .nav-item.active svg { stroke: var(--green-dark); }
  .sidebar-bottom {
    display: flex; align-items: center;
    justify-content: space-between;
    padding-top: 12px; border-top: 1px solid var(--border);
  }
  .admin-info .admin-name { font-size: 13.5px; font-weight: 600; color: var(--ink); }
  .admin-info .admin-label { font-size: 11.5px; color: var(--muted); }
  .logout-icon {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; cursor: pointer; transition: background 0.15s ease; text-decoration: none;
  }
  .logout-icon:hover { background: var(--error-bg); }
  .logout-icon svg { width: 17px; height: 17px; stroke: var(--muted); fill: none; }
  .logout-icon:hover svg { stroke: var(--error); }

  /* ===== MAIN ===== */
  .main { flex: 1; padding: 40px 48px; overflow-y: auto; }

  h1.page-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 600; color: var(--ink);
    margin-bottom: 28px;
  }

  /* ===== FILTER ROW ===== */
  .filter-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 24px;
  }

  .select-wrap {
    position: relative; display: inline-flex; align-items: center;
  }
  .select-wrap select {
    appearance: none;
    padding: 7px 32px 7px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px; color: var(--ink);
    cursor: pointer; outline: none;
  }
  .select-wrap::after {
    content: '';
    position: absolute; right: 10px;
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid var(--muted);
    pointer-events: none;
  }

  .date-range-wrap {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    font-size: 13px; color: var(--ink);
  }
  .date-range-wrap svg { width: 14px; height: 14px; stroke: var(--muted); fill: none; flex-shrink: 0; }
  .date-range-wrap input[type="date"] {
    border: none; outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px; color: var(--ink);
    background: transparent; cursor: pointer;
  }
  .date-range-wrap span { color: var(--muted); font-size: 12px; }

  /* ===== STAT CARDS ===== */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .stat-card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .stat-label { font-size: 12.5px; color: var(--muted); font-weight: 500; }
  .stat-icon svg { width: 18px; height: 18px; stroke: var(--muted); fill: none; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--ink); line-height: 1; }
  .stat-card.denda .stat-label { color: #a01c1c; }
  .stat-card.denda .stat-value { color: #a01c1c; }
  .stat-card.denda .stat-icon svg { stroke: #a01c1c; }

  /* ===== LAPORAN SECTION ===== */
  .laporan-section { }
  .laporan-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 12px; }

  .table-wrap {
    background: #fff; border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; margin-bottom: 16px;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  thead th {
    text-align: left; padding: 13px 16px;
    font-size: 13px; font-weight: 700; color: var(--ink);
  }
  tbody tr { border-bottom: 1px solid #f0ece3; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf8f3; }
  tbody td { padding: 12px 16px; font-size: 13.5px; color: var(--ink); vertical-align: middle; }
  .empty-row td { text-align: center; color: var(--muted); padding: 40px; }

  .student-cell { display: flex; align-items: center; gap: 10px; }
  .avatar-sm {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--green-soft); color: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
  }

  .buku-cell { display: flex; align-items: center; gap: 10px; }
  .buku-thumb {
    width: 32px; height: 40px; border-radius: 3px;
    background: var(--green-soft); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .buku-thumb svg { width: 14px; height: 14px; stroke: var(--green-dark); fill: none; }
  .buku-judul { font-size: 13px; font-weight: 600; color: var(--ink); }
  .buku-penulis { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .badge-kategori {
    display: inline-block; padding: 3px 10px;
    background: #ece9e2; color: var(--ink);
    border-radius: 4px; font-size: 12px; font-weight: 500;
  }

  .availability { font-size: 13px; font-weight: 500; }
  .availability.available { color: #2f7a45; }
  .availability.unavailable { color: #a01c1c; }

  .status-pill {
    display: inline-block; padding: 3px 11px;
    border-radius: 4px; font-size: 12px; font-weight: 500;
  }
  .status-pill.aktif     { background: #d6e8df; color: #2b2b26; }
  .status-pill.nonaktif  { background: #ece9e2; color: #2b2b26; }

  .denda-text { color: #a01c1c; font-weight: 500; }
  .dash-muted { color: var(--muted); }

  /* ===== EXPORT BTN ===== */
  .export-row { display: flex; justify-content: flex-end; }
  .btn-ekspor {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--ink); cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-ekspor svg { width: 15px; height: 15px; stroke: var(--ink); fill: none; }
  .btn-ekspor:hover { background: var(--green-soft); color: var(--green-dark); }
  .btn-ekspor:hover svg { stroke: var(--green-dark); }

  /* ===== LOGOUT MODAL ===== */
  .logout-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,30,24,0.45);
    display: none; align-items: center; justify-content: center;
    padding: 24px; z-index: 150;
  }
  .logout-modal-overlay.show { display: flex; }
  .logout-modal-card {
    background: #fff; border-radius: 8px;
    max-width: 420px; width: 100%;
    padding: 40px 32px 28px; text-align: center;
  }
  .logout-modal-text { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 32px; }
  .logout-modal-actions { display: flex; justify-content: space-between; }
  .lm-btn { padding: 10px 22px; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }
  .lm-btn.cancel { background: #ece8de; color: var(--ink); }
  .lm-btn.keluar { background: #a01c1c; color: #fff; }

  /* TOAST */
  .toast {
    position: fixed; top: 24px; right: 24px;
    background: var(--green-dark); color: var(--cream);
    padding: 13px 20px; border-radius: 4px;
    font-size: 13.5px; font-weight: 500;
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.3);
    opacity: 0; transform: translateY(-8px); pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="sidebar-brand">Admin</div>
      <a href="dashboard_admin.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </a>
      <a href="kelola_buku_admin.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>
        Kelola Buku
      </a>
      <a href="kelola_anggota_admin.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3.5"/><path d="M3 21c0-3.9 3.1-7 7-7"/><circle cx="17" cy="15" r="3"/><path d="M14 21v-1a3 3 0 0 1 6 0v1"/></svg>
        Kelola Anggota
      </a>
      <a href="kelola_transaksi.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3H1v18h15"/><path d="M8 21V3"/><path d="m17 8 4 4-4 4"/><path d="M21 12H9"/></svg>
        Transaksi
      </a>
      <a href="laporan.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Laporan
      </a>
    </div>
    <div class="sidebar-bottom">
      <div class="admin-info">
        <div class="admin-name" id="adminName">Admin Name</div>
        <div class="admin-label">Logout</div>
      </div>
      <a href="#" class="logout-icon" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <h1 class="page-title">Laporan</h1>

    <!-- FILTER ROW -->
    <div class="filter-row">
      <div class="select-wrap">
        <select id="jenisLaporan">
          <option value="transaksi">Laporan Transaksi</option>
          <option value="buku">Data Buku</option>
          <option value="anggota">Data Anggota</option>
          <option value="peminjaman">Transaksi Peminjaman</option>
          <option value="pengembalian">Transaksi Pengembalian</option>
        </select>
      </div>
      <div class="date-range-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <input type="date" id="startDate">
        <span>–</span>
        <input type="date" id="endDate">
      </div>
    </div>

    <!-- STAT CARDS -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-label">Total Transaksi</div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3H1v18h15"/><path d="M8 21V3"/><path d="m17 8 4 4-4 4"/><path d="M21 12H9"/></svg>
          </div>
        </div>
        <div class="stat-value" id="statTotalTransaksi">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-label">Buku Dipinjam</div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>
          </div>
        </div>
        <div class="stat-value" id="statBukuDipinjam">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-label">Anggota Aktif</div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3.5"/><path d="M3 21c0-3.9 3.1-7 7-7"/><circle cx="17" cy="15" r="3"/><path d="M14 21v-1a3 3 0 0 1 6 0v1"/></svg>
          </div>
        </div>
        <div class="stat-value" id="statAnggotaAktif">—</div>
      </div>
      <div class="stat-card denda">
        <div class="stat-card-top">
          <div class="stat-label">Total Denda</div>
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
        </div>
        <div class="stat-value" id="statTotalDenda">—</div>
      </div>
    </div>

    <!-- LAPORAN TABLE -->
    <div class="laporan-section">
      <div class="laporan-title" id="laporanTitle">Laporan Transaksi</div>
      <div class="table-wrap">
        <table>
          <thead><tr id="tableHead"></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="export-row">
        <button class="btn-ekspor" id="btnEkspor">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Ekspor Laporan
        </button>
      </div>
    </div>
  </main>

  <!-- LOGOUT MODAL -->
  <div class="logout-modal-overlay" id="logoutModal">
    <div class="logout-modal-card">
      <p class="logout-modal-text">Apakah kamu yakin ingin keluar?</p>
      <div class="logout-modal-actions">
        <button class="lm-btn cancel" id="cancelLogout">Batal</button>
        <button class="lm-btn keluar" id="keluarBtn">Keluar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/laporan_admin.js"></script>
</body>
</html>
