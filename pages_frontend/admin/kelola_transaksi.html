<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelola Transaksi — Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --green-dark: #1d3b2f;
    --green-darker: #14291f;
    --green-soft: #e7ede9;
    --cream: #f4f1ea;
    --ink: #2b2b26;
    --muted: #7a7a72;
    --border: #e2ddd0;
    --input-bg: #f5f3ee;
    --error: #b3492f;
    --error-bg: #fbeae5;
    --ok-text: #2f7a45;
    --ok-bg: #dde8df;
    --warn-text: #8a4500;
    --warn-bg: #f9e0c8;
    --warn-border: #e8b886;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--cream);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: 28px 20px; min-height: 100vh;
  }
  .sidebar-brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 600;
    color: var(--green-dark); text-align: center; margin-bottom: 36px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px; border-radius: 4px;
    color: var(--ink); text-decoration: none;
    font-size: 13.5px; font-weight: 500; margin-bottom: 4px;
    transition: background 0.15s ease;
  }
  .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; stroke: var(--ink); fill: none; }
  .nav-item:hover { background: var(--green-soft); }
  .nav-item.active { background: var(--green-soft); color: var(--green-dark); font-weight: 600; }
  .nav-item.active svg { stroke: var(--green-dark); }
  .sidebar-bottom {
    display: flex; align-items: center;
    justify-content: space-between;
    padding-top: 12px; border-top: 1px solid var(--border);
  }
  .admin-info .admin-name { font-size: 13.5px; font-weight: 600; color: var(--ink); }
  .admin-info .admin-label { font-size: 11.5px; color: var(--muted); }
  .logout-icon {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; cursor: pointer; transition: background 0.15s ease; text-decoration: none;
  }
  .logout-icon:hover { background: var(--error-bg); }
  .logout-icon svg { width: 17px; height: 17px; stroke: var(--muted); fill: none; }
  .logout-icon:hover svg { stroke: var(--error); }

  /* ===== MAIN ===== */
  .main { flex: 1; padding: 40px 48px; overflow-y: auto; }

  .top-row {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 24px;
  }
  h1.page-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 600; color: var(--ink);
  }

  /* ===== FILTER TABS ===== */
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn {
    padding: 7px 18px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--ink); cursor: pointer;
    transition: all 0.15s ease;
  }
  .tab-btn:hover { background: var(--green-soft); }
  .tab-btn.active {
    background: var(--green-soft);
    color: var(--green-dark);
    border-color: var(--green-soft);
    font-weight: 600;
  }

  /* ===== TABLE ===== */
  .table-wrap {
    background: #fff; border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  thead th {
    text-align: left; padding: 13px 16px;
    font-size: 13px; font-weight: 700; color: var(--ink);
  }
  tbody tr { border-bottom: 1px solid #f0ece3; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf8f3; }
  tbody td { padding: 13px 16px; font-size: 13.5px; color: var(--ink); vertical-align: middle; }

  .student-cell { display: flex; align-items: center; gap: 10px; }
  .avatar-sm {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--green-soft); color: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }

  /* Status pills */
  .status-pill {
    display: inline-block; padding: 4px 12px;
    border-radius: 4px; font-size: 12px; font-weight: 500;
  }
  .status-pill.aktif     { background: #d6e8df; color: #2b2b26; }
  .status-pill.terlambat { background: #f5d5d5; color: #2b2b26; }
  .status-pill.selesai   { background: #ece9e2; color: #2b2b26; }

  /* Action button kembalikan */
  .btn-kembalikan {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--ink); cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-kembalikan:hover { background: var(--green-soft); border-color: var(--border); color: var(--green-dark); }
  .btn-kembalikan.terlambat { border-color: #e8a0a0; }
  .btn-kembalikan.terlambat:hover { background: #fdf0f0; border-color: #e8a0a0; color: #a01c1c; }

  .dash-muted { color: var(--muted); }
  .empty-row td { text-align: center; color: var(--muted); padding: 40px; }

  /* ===== MODAL KONFIRMASI ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,30,24,0.45);
    display: none; align-items: center; justify-content: center;
    padding: 24px; z-index: 100;
  }
  .modal-overlay.show { display: flex; animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-card {
    background: #fff; border-radius: 8px;
    width: 100%; max-width: 420px; padding: 36px 32px 28px;
    animation: popIn 0.18s ease; text-align: center;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
  .modal-desc { font-size: 13.5px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 10px; }
  .btn { padding: 10px 22px; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; border: none; cursor: pointer; flex: 1; transition: opacity 0.15s ease; }
  .btn:hover { opacity: 0.85; }
  .btn.outline { background: transparent; border: 1px solid var(--border); color: var(--ink); }
  .btn.primary { background: var(--green-dark); color: #fff; }
  .btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* LOGOUT MODAL */
  .logout-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,30,24,0.45);
    display: none; align-items: center; justify-content: center;
    padding: 24px; z-index: 150;
  }
  .logout-modal-overlay.show { display: flex; }
  .logout-modal-card {
    background: #fff; border-radius: 8px;
    max-width: 420px; width: 100%;
    padding: 40px 32px 28px; text-align: center;
  }
  .logout-modal-text { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 32px; }
  .logout-modal-actions { display: flex; justify-content: space-between; }
  .lm-btn { padding: 10px 22px; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }
  .lm-btn.cancel { background: #ece8de; color: var(--ink); }
  .lm-btn.keluar { background: #a01c1c; color: #fff; }

  /* TOAST */
  .toast {
    position: fixed; top: 24px; right: 24px;
    background: var(--green-dark); color: var(--cream);
    padding: 13px 20px; border-radius: 4px;
    font-size: 13.5px; font-weight: 500;
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.3);
    opacity: 0; transform: translateY(-8px); pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>

      <a href="kelola_transaksi.html" class="nav-item active">

      <a href="laporan.html" class="nav-item">

    </div>
    <div class="sidebar-bottom">
      <div class="admin-info">
        <div class="admin-name" id="adminName">Admin Name</div>

      </div>
      <a href="#" class="logout-icon" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </a>

  <!-- MAIN -->
  <main class="main">
    <div class="top-row">
      <h1 class="page-title">Kelola Transaksi</h1>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="tab-btn active" data-filter="semua">Semua</button>
      <button class="tab-btn" data-filter="aktif">Aktif</button>
      <button class="tab-btn" data-filter="terlambat">Terlambat</button>
      <button class="tab-btn" data-filter="selesai">Selesai</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Book</th>
            <th>Tgl Pinjam</th>
            <th>Jatuh Tempo</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="transaksiBody"></tbody>
      </table>
    </div>
  </main>

  <!-- MODAL KONFIRMASI KEMBALIKAN -->
  <div class="modal-overlay" id="modalKonfirmasi">
    <div class="modal-card">
      <div class="modal-title">Konfirmasi Pengembalian</div>
      <div class="modal-desc" id="modalDesc">Tandai buku ini sebagai sudah dikembalikan?</div>
      <div class="modal-actions">
        <button class="btn outline" id="btnBatalKonfirmasi">Batal</button>
        <button class="btn primary" id="btnKonfirmasiOk">Ya, Kembalikan</button>
      </div>
    </div>
  </div>

  <!-- LOGOUT MODAL -->
  <div class="logout-modal-overlay" id="logoutModal">
    <div class="logout-modal-card">
      <p class="logout-modal-text">Apakah kamu yakin ingin keluar?</p>
      <div class="logout-modal-actions">
        <button class="lm-btn cancel" id="cancelLogout">Batal</button>
        <button class="lm-btn keluar" id="keluarBtn">Keluar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/kelola_transaksi_admin.js"></script>
