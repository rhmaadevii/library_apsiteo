<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin — Inas Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --green-dark: #1d3b2f;
    --green-darker: #14291f;
    --cream: #f4f1ea;
    --cream-card: #fbfaf6;
    --ink: #2b2b26;
    --muted: #7a7a72;
    --border: #e2ddd0;
    --input-bg: #ece8de;
    --error: #b3492f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--cream-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 48px 40px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    color: var(--muted);
    text-decoration: none;
    margin-bottom: 32px;
    transition: color 0.15s ease;
  }

  .back-link:hover { color: var(--green-dark); }

  .back-link svg {
    width: 13px;
    height: 13px;
  }

  .eyebrow {
    font-size: 11.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--green-dark);
    margin-bottom: 36px;
  }

  .field {
    margin-bottom: 22px;
  }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    padding: 13px 16px;
    background: var(--input-bg);
    border: 1px solid transparent;
    border-radius: 3px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .field input::placeholder {
    color: #9a968a;
  }

  .field input:focus {
    border-color: var(--green-dark);
    background: var(--cream-card);
  }

  .field input.invalid {
    border-color: var(--error);
  }

  .field-error {
    font-size: 12px;
    color: var(--error);
    margin-top: 6px;
    display: none;
  }

  .field-error.show { display: block; }

  .form-error {
    background: #f8e9e4;
    border: 1px solid #e3b4a4;
    color: var(--error);
    font-size: 13px;
    padding: 11px 14px;
    border-radius: 3px;
    margin-bottom: 22px;
    display: none;
  }

  .form-error.show { display: block; }

  .submit-btn {
    width: 100%;
    padding: 15px;
    margin-top: 12px;
    background: var(--green-dark);
    color: var(--cream);
    border: none;
    border-radius: 3px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-btn:hover { background: var(--green-darker); }

  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(244, 241, 234, 0.4);
    border-top-color: var(--cream);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .spinner.show { display: inline-block; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

  <div class="login-card">
    <a href="../../index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      Kembali
    </a>

    <p class="eyebrow">Welcome back, Admin</p>
    <h1>Log in</h1>

    <div class="form-error" id="formError">Username/email atau password yang Anda masukkan salah.</div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="identifier">Username atau Email</label>
        <input type="text" id="identifier" name="identifier" placeholder="Masukkan Username atau Email" autocomplete="username">
        <div class="field-error" id="identifierError">Username atau email wajib diisi.</div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Masukkan Password" autocomplete="current-password">
        <div class="field-error" id="passwordError">Password wajib diisi.</div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="spinner" id="spinner"></span>
        <span id="submitLabel">Log In</span>
      </button>
    </form>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth_admin.js"></script>
</body>
</html>
