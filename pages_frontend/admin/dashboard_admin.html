<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin — Inas Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --green-dark: #1d3b2f;
    --green-darker: #14291f;
    --green-soft: #e7ede9;
    --cream: #f4f1ea;
    --cream-card: #fbfaf6;
    --ink: #2b2b26;
    --muted: #7a7a72;
    --border: #e2ddd0;
    --error: #b3492f;
    --error-bg: #fbeae5;
    --ok-bg: #dde8df;
    --ok-text: #2f5d44;
    --gray-bg: #f1efe8;
    --gray-text: #aba89f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--cream);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px 20px;
    min-height: 100vh;
  }

  .sidebar-brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--green-dark);
    text-align: center;
    margin-bottom: 36px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border-radius: 4px;
    color: var(--ink);
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 500;
    margin-bottom: 4px;
    transition: background 0.15s ease;
  }

  .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; stroke: var(--ink); }
  .nav-item:hover { background: var(--green-soft); }
  .nav-item.active { background: var(--green-soft); color: var(--green-dark); font-weight: 600; }
  .nav-item.active svg { stroke: var(--green-dark); }

  .sidebar-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .admin-info .admin-name {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink);
  }

  .admin-info .admin-label {
    font-size: 11.5px;
    color: var(--muted);
  }

  .logout-icon {
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s ease;
    text-decoration: none;
  }

  .logout-icon:hover { background: var(--error-bg); }
  .logout-icon svg { width: 17px; height: 17px; stroke: var(--muted); }
  .logout-icon:hover svg { stroke: var(--error); }

  /* ===== MAIN ===== */
  .main {
    flex: 1;
    padding: 40px 48px;
    overflow-y: auto;
  }

  h1.page-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 28px;
  }

  /* ===== STAT CARDS ===== */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 22px 24px;
    position: relative;
  }

  .stat-card.denda {
    grid-column: 1 / 2;
    border-color: #e3b4a4;
  }

  .stat-label {
    font-size: 12.5px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .stat-label.denda-label { color: var(--error); }

  .stat-icon {
    width: 18px;
    height: 18px;
    stroke: var(--muted);
  }

  .stat-icon.denda-icon { stroke: var(--error); }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .stat-value.denda-value { color: var(--error); }

  /* ===== TABEL TRANSAKSI ===== */
  .section-title {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 12px;
    margin-top: 28px;
  }

  .table-container {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
  }

  thead th {
    text-align: left;
    padding: 13px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
  }

  tbody tr {
    border-bottom: 1px solid #f0ece3;
  }

  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 14px 20px;
    font-size: 13.5px;
    color: var(--ink);
  }

  .status-pill {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
  }

  .status-pill.aktif { background: var(--ok-bg); color: var(--ok-text); }
  .status-pill.terlambat { background: #f3c7b8; color: var(--error); }
  .status-pill.kembali { background: var(--gray-bg); color: var(--gray-text); }

  /* ===== LOGOUT MODAL ===== */
  .logout-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 30, 24, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
  }

  .logout-modal-overlay.show { display: flex; animation: fadeIn 0.15s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .logout-modal-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    max-width: 420px;
    width: 100%;
    padding: 40px 32px 28px;
    text-align: center;
    animation: popIn 0.18s ease;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .logout-modal-text {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 32px;
  }

  .logout-modal-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .lm-btn {
    padding: 10px 22px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  .lm-btn:hover { opacity: 0.85; }
  .lm-btn.cancel { background: #ece8de; color: var(--ink); }
  .lm-btn.keluar { background: #a01c1c; color: #fff; }
</style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="sidebar-brand">Admin</div>
      <a href="dashboard_admin.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </a>
      <a href="kelola_buku_admin.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>
        Kelola Buku
      </a>
      <a href="kelola_anggota_admin.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3.5"/><path d="M3 21c0-3.9 3.1-7 7-7"/><circle cx="17" cy="15" r="3"/><path d="M14 21v-1a3 3 0 0 1 6 0v1"/></svg>
        Kelola Anggota
      </a>
      <a href="kelola_transaksi.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3H1v18h15"/><path d="M8 21V3"/><path d="m17 8 4 4-4 4"/><path d="M21 12H9"/></svg>
        Transaksi
      </a>
      <a href="laporan.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Laporan
      </a>
    </div>

    <div class="sidebar-bottom">
      <div class="admin-info">
        <div class="admin-name" id="adminName">Admin Name</div>
        <div class="admin-label">Logout</div>
      </div>
      <a href="#" class="logout-icon" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <h1 class="page-title">Dashboard</h1>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">
          Total Buku
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>
        </div>
        <div class="stat-value" id="statTotalBuku">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">
          Total Anggota
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3.5"/><path d="M3 21c0-3.9 3.1-7 7-7"/><circle cx="17" cy="15" r="3"/><path d="M14 21v-1a3 3 0 0 1 6 0v1"/></svg>
        </div>
        <div class="stat-value" id="statTotalAnggota">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">
          Dipinjam
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3H1v18h15"/><path d="M8 21V3"/><path d="m17 8 4 4-4 4"/><path d="M21 12H9"/></svg>
        </div>
        <div class="stat-value" id="statDipinjam">—</div>
      </div>
    </div>

    <div class="stat-card denda" style="max-width:calc(33.33% - 11px)">
      <div class="stat-label denda-label">
        Denda Aktif
        <svg class="stat-icon denda-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="stat-value denda-value" id="statDenda">—</div>
    </div>

    <p class="section-title">Transaksi Terbaru</p>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Anggota</th>
            <th>Buku</th>
            <th>Tanggal Pinjam</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="transaksiBody">
          <tr><td colspan="4" style="text-align:center; color:#7a7a72; padding:24px">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- LOGOUT MODAL -->
  <div class="logout-modal-overlay" id="logoutModal">
    <div class="logout-modal-card">
      <p class="logout-modal-text">Apakah kamu yakin ingin keluar?</p>
      <div class="logout-modal-actions">
        <button class="lm-btn cancel" id="cancelBtn">Batal</button>
        <button class="lm-btn keluar" id="keluarBtn">Keluar</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/dashboard.js"></script>
</body>
</html>
